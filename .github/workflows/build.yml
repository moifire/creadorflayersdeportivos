name: Build ultra playlist and agenda

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ensure folders exist
        run: |
          mkdir -p cards
          mkdir -p backdrops
          mkdir -p channel_logos

      - name: Build cards, backdrops, playlist and agenda
        run: |
          python build_cards.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards backdrops eventos_acestream_hosting_pro.m3u agenda_deportiva.json
          git add index_agenda_deportiva.html github_config.json build_cards.py
          git commit -m "Auto update ultra cards, playlist and agenda" || echo "No changes to commit"
          git push
